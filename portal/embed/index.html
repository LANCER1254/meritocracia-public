<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meritocracia ADV Embed</title>
<link rel="stylesheet" href="../assets/adv-launcher.css">
<style>
  body {
    overflow: hidden;
  }

  .embed-shell {
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .embed-header {
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    border-bottom: 1px solid rgba(200,164,90,0.22);
    background: rgba(7,9,16,0.96);
  }

  .embed-title {
    color: #f5dfa0;
    letter-spacing: 0.12em;
    font-size: 14px;
  }

  .embed-link {
    color: #c8a45a;
    text-decoration: none;
    font-size: 13px;
  }

  .embed-body {
    flex: 1;
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .placeholder {
    max-width: 720px;
    border: 1px solid rgba(200,164,90,0.25);
    background: rgba(255,255,255,0.03);
    padding: 32px;
    text-align: center;
  }

  .placeholder h1 {
    margin-top: 0;
    font-size: 28px;
  }

  .placeholder p {
    color: #9d927e;
    line-height: 1.8;
  }
</style>
</head>
<body>
  <div class="embed-shell">
    <header class="embed-header">
      <div class="embed-title">MERITOCRACIA ADV EMBED</div>
      <a class="embed-link" href="../adv/">← Launcherへ戻る</a>
    </header>

    <main class="embed-body">
      <section class="placeholder">
        <h1>Ren'Py Web Build 接続待ち</h1>
        <p>
          ここに将来的に Ren'Py Web Build を iframe 接続します。<br>
          現在は wrapper / portal 統合テスト段階です。
        </p>
        <p>
          接続予定：ep01 / map / mini prototype
        </p>
      </section>
    </main>
  </div>
</body>
</html>
